<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="icon" href="Insightrix.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --brand-navy: #0A192F;
            --brand-gold: #D4AF37;
            --text-dark: #1F2937;
            --bg-light: #F9FAFB;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            background: var(--bg-light);
        }

        /* 링크 밑줄 제거 (전체 적용) */
        a {
            text-decoration: none !important;
            color: inherit;
        }

        nav {
            padding: 10px 40px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.98);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 로고 스타일: 200px 크기 고정 */
        .logo img {
            height: 200px;
            width: auto;
            display: block;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .nav-links a {
            color: var(--brand-navy);
            transition: 0.3s;
            cursor: pointer;
            border-bottom: none;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--brand-gold);
        }

        /* 컨텐츠 스타일 */
        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .info-item {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            align-items: center;
        }

        .icon-box {
            font-size: 1.5rem;
            color: var(--brand-navy);
            width: 50px;
            text-align: center;
        }

        iframe {
            border: 0;
            width: 100%;
        }

        footer {
            background: #0A192F;
            color: #aaa;
            padding: 60px 40px;
            text-align: center;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }

            nav {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html" class="logo"><img src="Insightrix.png" alt="Insightrix Logo"></a>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="company.html">Company</a>
            <a href="auditflow.html">AuditFlow</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <div style="background: #0A192F; color: white; text-align: center; padding: 80px 20px;">
        <h1>Get in Touch</h1>
        <p>파트너십, 투자, 솔루션 도입 문의</p>
    </div>

    <div class="container">
        <div class="card">
            <h3 style="margin-top:0; color:var(--brand-navy);">Contact Info</h3>
            <div class="info-item">
                <div class="icon-box"><i class="fas fa-map-marker-alt"></i></div>
                <div>
                    <h4>Location</h4>
                    <p>서울특별시 강남구 테헤란로</p>
                </div>
            </div>
            <div class="info-item">
                <div class="icon-box"><i class="fas fa-envelope"></i></div>
                <div>
                    <h4>Email</h4>
                    <p>insightrix1004@gmail.com</p>
                </div>
            </div>
            <div class="info-item">
                <div class="icon-box"><i class="fas fa-phone-alt"></i></div>
                <div>
                    <h4>Phone</h4>
                    <p>010-3479-0526</p>
                </div>
            </div>
            <div style="height: 250px; border-radius: 15px; overflow: hidden; margin-top: 20px;">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3162.926943899127!2d126.9748473153106!3d37.56653597979851!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357ca1b47db63849%3A0x6c9c7f1a3028447d!2z7ISc7Jq47Yq567OE7Iuc7LKt!5e0!3m2!1sko!2skr!4v1646723225881!5m2!1sko!2skr"
                    style="height: 100%;" loading="lazy"></iframe>
            </div>
        </div>
        <div class="card" style="padding: 10px;">
            <iframe
                src="https://docs.google.com/forms/d/e/1FAIpQLSdaceSg7sSHIbFXH9JLB06xQ5go0Kh-vubLm4E7xXt48kYX-w/viewform?embedded=true"
                height="850">Loading...</iframe>
        </div>
    </div>

    <footer>
        <p>© 2025 Insightrix Corp. All Rights Reserved.</p>
    </footer>

</body>

</html>
