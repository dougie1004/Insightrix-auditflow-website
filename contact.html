<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Insightrix Intelligence</title>
    <link rel="icon" href="Insightrix.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --brand-navy: #0A192F;
            --brand-gold: #D4AF37;
            --text-dark: #1F2937;
            --bg-light: #F9FAFB;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            background: var(--bg-light);
            line-height: 1.6;
        }

        a {
            text-decoration: none !important;
            color: inherit;
        }

        /* 통합 네비게이션 스타일 */
        nav {
            padding: 10px 40px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.98);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo img {
            height: 80px; /* 통합 사이즈 */
            width: auto;
            display: block;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .nav-links a {
            color: var(--brand-navy);
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--brand-gold);
        }

        /* 컨텐츠 스타일 */
        .hero-banner {
            background: #0A192F;
            color: white;
            text-align: center;
            padding: 100px 20px;
        }

        .container {
            max-width: 1200px;
            margin: -50px auto 80px;
            padding: 0 24px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 40px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
        }

        .info-item {
            display: flex;
            gap: 20px;
            margin-bottom: 35px;
            align-items: center;
        }

        .icon-box {
            font-size: 1.3rem;
            color: var(--brand-navy);
            width: 50px;
            height: 50px;
            background: var(--bg-light);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info-content h4 {
            margin: 0 0 5px 0;
            color: var(--brand-navy);
            font-weight: 800;
        }

        .info-content p {
            margin: 0;
            color: #555;
            font-weight: 500;
        }

        /* 지도 영역 스타일 */
        .map-wrapper {
            height: 350px;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 30px;
            border: 1px solid #f1f5f9;
        }

        iframe {
            border: 0;
            width: 100%;
            height: 100%;
        }

        footer {
            background: #0A192F;
            color: #aaa;
            padding: 80px 40px;
            text-align: center;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                margin-top: 30px;
            }
            nav {
                flex-direction: column;
                padding: 20px;
                gap: 20px;
            }
            .nav-links {
                gap: 20px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html" class="logo"><img src="Insightrix.png" alt="Insightrix Logo"></a>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="accountingflow.html">AccountingFlow</a>
            <a href="auditflow.html">AuditFlow</a>
            <a href="company.html">Company</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <div class="hero-banner">
        <div style="color: var(--brand-gold); font-weight: 800; margin-bottom: 15px; letter-spacing: 2px;">GET IN TOUCH</div>
        <h1 style="font-size: 2.8rem; margin-bottom: 15px; font-weight: 800;">Contact Our Team</h1>
        <p style="opacity: 0.8; font-size: 1.1rem; max-width: 700px; margin: 0 auto;">인사이트릭스는 기업의 투명성과 혁신을 위해 언제나 열려있습니다.<br>비즈니스 협력 및 솔루션 도입 문의를 남겨주세요.</p>
    </div>

    <div class="container">
        <div class="card">
            <h3 style="margin-top:0; color:var(--brand-navy); font-size: 1.8rem; margin-bottom: 40px; font-weight: 800;">Contact Details</h3>
            
            <div class="info-item">
                <div class="icon-box"><i class="fas fa-map-marker-alt"></i></div>
                <div class="info-content">
                    <h4>Location</h4>
                    <p>서울특별시 강남구 테헤란로 123 (역삼동)</p>
                </div>
            </div>

            <div class="info-item">
                <div class="icon-box"><i class="fas fa-envelope"></i></div>
                <div class="info-content">
                    <h4>Email</h4>
                    <p>insightrix1004@gmail.com</p>
                </div>
            </div>

            <div class="info-item">
                <div class="icon-box"><i class="fas fa-phone-alt"></i></div>
                <div class="info-content">
                    <h4>Phone</h4>
                    <p>010-3479-0526</p>
                </div>
            </div>

            <div class="map-wrapper">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3164.7925761845!2d127.028475976251!3d37.49808542898!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357ca15060799fd9%3A0xe4d830b91d29480!2z7YWM7Zek656A66GcIDEyMw!5e0!3m2!1sko!2skr!4v1710000000000!5m2!1sko!2skr" 
                    loading="lazy">
                </iframe>
            </div>
        </div>

        <div class="card" style="padding: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center;">
            <iframe
                src="https://docs.google.com/forms/d/e/1FAIpQLSdaceSg7sSHIbFXH9JLB06xQ5go0Kh-vubLm4E7xXt48kYX-w/viewform?embedded=true"
                height="850" style="width: 100%; border: none;">Loading...</iframe>
        </div>
    </div>

    <footer>
        <div style="margin-bottom: 30px;">
            <img src="Insightrix.png" alt="Insightrix" style="height: 45px; filter: brightness(0) invert(1); opacity: 0.6;">
        </div>
        <p>© 2026 Insightrix Corp. All Rights Reserved.</p>
    </footer>

</body>

</html>
