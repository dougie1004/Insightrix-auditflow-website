<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insightrix | Data Intelligence</title>
    <link rel="icon" href="Insightrix.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --brand-navy: #0A192F;
            --brand-gold: #D4AF37;
            --text-dark: #1F2937;
            --bg-light: #F9FAFB;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-dark);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* 네비게이션 */
        nav {
            padding: 10px 40px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.98);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 로고 크기 200px 적용 */
        .logo img {
            height: 200px;
            width: auto;
            display: block;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .nav-links a {
            color: var(--brand-navy);
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--brand-gold);
        }

        .hero {
            text-align: center;
            padding: 140px 20px;
            background: #0A192F;
            color: white;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .cta-button {
            background: var(--brand-gold);
            color: var(--brand-navy);
            padding: 15px 40px;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
        }

        .section {
            padding: 100px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            display: flex;
            align-items: center;
            gap: 50px;
            background: var(--bg-light);
            padding: 50px;
            border-radius: 30px;
        }

        .product-img img {
            width: 100%;
            border-radius: 15px;
        }

        footer {
            background: #0A192F;
            color: #aaa;
            padding: 60px 40px;
            text-align: center;
        }

        @media (max-width: 968px) {
            .product-card {
                flex-direction: column;
            }

            nav {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html" class="logo"><img src="Insightrix.png" alt="Insightrix Logo"></a>
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="company.html">Company</a>
            <a href="auditflow.html">AuditFlow</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <h1>정교한 지표로 통찰을 그리다</h1>
        <p style="margin-bottom: 50px; opacity: 0.8; font-size: 1.2rem;">데이터에 숨겨진 진실을 찾아 기업의 올바른 의사결정을 돕습니다.</p>
        <a href="auditflow.html" class="cta-button">솔루션 살펴보기</a>
    </section>

    <section class="section">
        <h2 style="text-align: center; margin-bottom: 50px; font-size: 2.5rem; color: var(--brand-navy);">Our Solutions
        </h2>
        <div class="product-card">
            <div style="flex:1;">
                <h3 style="font-size: 2rem; color: var(--brand-navy); margin-bottom: 20px;">AuditFlow</h3>
                <p style="font-size: 1.1rem; line-height: 1.6;">
                    <strong>Gemini 3.0 Pro 기반 자율 감사 시스템</strong><br>
                    2년치 데이터를 10초 만에 분석하여 리스크 사각지대를 제거합니다.
                </p>
                <br>
                <a href="auditflow.html" class="cta-button">상세 보기 →</a>
            </div>
            <div style="flex:1;">
                <img src="auditflow_demo.gif" alt="AuditFlow Demo">
            </div>
        </div>
    </section>

    <footer>
        <p>© 2025 Insightrix Corp. All Rights Reserved.</p>
    </footer>

</body>

</html>
